<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deloitte Digital · Lifestyle Innovation Day 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #080808;
      color: #fff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .bg {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 60% 50% at 60% 40%, rgba(159,210,53,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 40% 60% at 10% 80%, rgba(159,210,53,0.04) 0%, transparent 60%),
        #080808;
    }

    .grid {
      position: fixed; inset: 0; z-index: 0; opacity: 0.04;
      background-image: linear-gradient(#fff 1px, transparent 1px),
                        linear-gradient(90deg, #fff 1px, transparent 1px);
      background-size: 80px 80px;
    }

    .card {
      position: relative; z-index: 1;
      text-align: center;
      max-width: 560px;
      padding: 0 24px;
      animation: fadeUp 1s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .lid {
      font-family: 'Playfair Display', serif;
      font-size: 15px; font-weight: 700;
      color: #9FD235;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .divider {
      width: 40px; height: 1px;
      background: rgba(159,210,53,0.4);
      margin: 20px auto;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(36px, 6vw, 56px);
      font-weight: 700;
      line-height: 1.15;
      margin-bottom: 20px;
    }

    h1 em { font-style: italic; color: #9FD235; }

    p {
      color: #888;
      font-size: 16px;
      line-height: 1.7;
      margin-bottom: 40px;
    }

    .meta {
      display: inline-flex; gap: 0;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px; overflow: hidden;
      margin-bottom: 48px;
    }

    .meta-item {
      padding: 14px 24px;
      border-right: 1px solid rgba(255,255,255,0.08);
    }
    .meta-item:last-child { border-right: none; }
    .meta-label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: #555; margin-bottom: 3px; }
    .meta-val   { font-size: 14px; font-weight: 600; }

    .badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(159,210,53,0.12);
      border: 1px solid rgba(159,210,53,0.3);
      border-radius: 40px;
      padding: 10px 20px;
      font-size: 12px; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: #9FD235;
    }

    .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #9FD235;
      animation: pulse 1.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    .footer {
      position: fixed; bottom: 28px; left: 0; right: 0;
      text-align: center;
      font-size: 12px; color: #444;
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="grid"></div>

  <div class="card">
    <div class="lid">Deloitte Digital · Lugano</div>
    <div class="divider"></div>
    <h1>Something <em>exciting</em><br>is coming.</h1>
    <p>We're getting ready for Lifestyle Innovation Day 2026.<br>See you at LAC Lugano on 18 May.</p>
    <div class="meta">
      <div class="meta-item">
        <div class="meta-label">Date</div>
        <div class="meta-val">18 May 2026</div>
      </div>
      <div class="meta-item">
        <div class="meta-label">Venue</div>
        <div class="meta-val">LAC Lugano</div>
      </div>
      <div class="meta-item">
        <div class="meta-label">Hours</div>
        <div class="meta-val">08:00 – 18:00</div>
      </div>
    </div>
    <br>
    <div class="badge">
      <span class="dot"></span>
      Page launching soon
    </div>
  </div>

  <div class="footer">lifestyleinnovationday.ch &nbsp;·&nbsp; deloitte.com/digital</div>
</body>
</html>
