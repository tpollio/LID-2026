<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LID 2026 · QR Code · Deloitte Digital</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="content.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #9FD235;
      --dark:   #080808;
      --border: #e0e0d8;
      --muted:  #888;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #f0f0ec;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      color: var(--dark);
    }

    /* ── TOOLBAR (hidden on print) ── */
    .toolbar {
      width: 100%; max-width: 480px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 32px;
      display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap;
    }
    .toolbar-group { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 200px; }
    .toolbar-group label {
      font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--muted);
    }
    .toolbar-group input {
      border: 1.5px solid var(--border); border-radius: 8px;
      padding: 10px 14px; font-family: 'Inter', sans-serif;
      font-size: 13px; outline: none; transition: border-color 0.2s;
    }
    .toolbar-group input:focus { border-color: var(--accent); }

    .toolbar-actions { display: flex; gap: 8px; align-items: center; }

    .lang-switch {
      display: flex; align-items: center;
      border: 1.5px solid var(--border); border-radius: 40px;
      overflow: hidden; height: 42px;
    }
    .lang-btn {
      background: none; border: none; padding: 0 14px;
      font-family: 'Inter', sans-serif; font-size: 11px;
      font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--muted); cursor: pointer; transition: background 0.15s, color 0.15s;
      height: 100%;
    }
    .lang-btn.active { background: var(--dark); color: #fff; }
    .lang-sep { width: 1px; height: 18px; background: var(--border); }

    .btn-print {
      background: var(--accent); color: #000;
      border: none; border-radius: 40px;
      padding: 0 20px; height: 42px;
      font-family: 'Inter', sans-serif;
      font-size: 12px; font-weight: 700; letter-spacing: 0.06em;
      text-transform: uppercase; cursor: pointer; white-space: nowrap;
      transition: opacity 0.2s;
    }
    .btn-print:hover { opacity: 0.85; }

    /* ── QR CARD ── */
    .qr-card {
      width: 100%; max-width: 380px;
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }

    .qr-card-top {
      background: var(--accent);
      padding: 24px 28px 20px;
      display: flex; align-items: center; justify-content: center;
    }
    .qr-brand { font-size: 14px; color: rgba(0,0,0,0.55); text-align: center; }
    .qr-brand strong { display: block; color: #000; font-size: 20px; font-weight: 700; letter-spacing: -0.01em; margin-bottom: 2px; }

    .qr-body {
      padding: 32px 28px;
      display: flex; flex-direction: column; align-items: center; gap: 20px;
    }

    .qr-code-wrap {
      width: 200px; height: 200px;
      border: 1px solid var(--border); border-radius: 12px;
      padding: 12px;
      display: flex; align-items: center; justify-content: center;
      background: #fff;
    }
    .qr-code-wrap canvas, .qr-code-wrap img { display: block; }

    .qr-cta { text-align: center; }
    .qr-cta-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--accent); margin-bottom: 6px;
    }
    .qr-cta-title {
      font-family: 'Playfair Display', serif;
      font-size: 22px; font-weight: 700; line-height: 1.2; margin-bottom: 8px;
    }
    .qr-cta-desc {
      font-size: 12px; color: var(--muted); line-height: 1.6;
    }

    .qr-card-bottom {
      border-top: 1px solid var(--border);
      padding: 14px 28px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .qr-event { font-size: 11px; color: var(--muted); }
    .qr-event strong { color: var(--dark); }
    .qr-url { font-size: 10px; color: #bbb; font-family: monospace; }

    /* ── PRINT ── */
    @media print {
      body { background: #fff; padding: 20px; justify-content: flex-start; }
      .toolbar { display: none !important; }
      .qr-card { box-shadow: none; max-width: 340px; margin: 0 auto; }
    }
  </style>
</head>
<body>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="toolbar-group">
    <label>URL</label>
    <input type="url" id="base-url"
           value="https://dd-at-lid2026.events"
           placeholder="https://yourdomain.com">
  </div>
  <div class="toolbar-actions">
    <div class="lang-switch">
      <button class="lang-btn active" data-lang="en">EN</button>
      <div class="lang-sep"></div>
      <button class="lang-btn" data-lang="it">IT</button>
    </div>
    <button class="btn-print" onclick="window.print()">🖨 Print</button>
  </div>
</div>

<!-- QR CARD -->
<div class="qr-card">

  <div class="qr-card-top">
    <div class="qr-brand">
      <strong>Deloitte Digital</strong>
      Lugano
    </div>
  </div>

  <div class="qr-body">
    <div class="qr-code-wrap" id="qr-container"></div>
    <div class="qr-cta">
      <div class="qr-cta-label" data-i18n="qr.label"></div>
      <div class="qr-cta-title" data-i18n="qr.title"></div>
      <div class="qr-cta-desc" data-i18n="qr.desc"></div>
    </div>
  </div>

  <div class="qr-card-bottom">
    <div class="qr-event" data-i18n="qr.event"></div>
    <div class="qr-url" id="qr-url-label"></div>
  </div>

</div>

<script>
  /* ── LANGUAGE ── */
  let currentLang = localStorage.getItem('lid-qr-lang') || 'en';

  function applyLanguage(lang) {
    const C = window.CONTENT[lang];
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const v = C[el.dataset.i18n];
      if (v !== undefined) el.innerHTML = v;
    });
    document.documentElement.lang = lang;
    document.querySelectorAll('.lang-btn').forEach(btn =>
      btn.classList.toggle('active', btn.dataset.lang === lang));
    localStorage.setItem('lid-qr-lang', lang);
    currentLang = lang;
  }

  document.querySelectorAll('.lang-btn').forEach(btn =>
    btn.addEventListener('click', () => applyLanguage(btn.dataset.lang)));

  /* ── QR CODE ── */
  function buildQR(base) {
    base = (base || '').replace(/\/$/, '').trim();
    const url = base ? base + '#connect' : '';
    const container = document.getElementById('qr-container');
    const label = document.getElementById('qr-url-label');

    container.innerHTML = '';
    label.textContent = url || '—';

    if (!url) return;

    new QRCode(container, {
      text:         url,
      width:        176,
      height:       176,
      colorDark:    '#080808',
      colorLight:   '#ffffff',
      correctLevel: QRCode.CorrectLevel.M,
    });
  }

  const input = document.getElementById('base-url');
  applyLanguage(currentLang);
  buildQR(input.value);
  input.addEventListener('input', () => buildQR(input.value));

  // ?url= query param support
  const params = new URLSearchParams(location.search);
  if (params.get('url')) {
    input.value = params.get('url');
    buildQR(params.get('url'));
  }
</script>

</body>
</html>
